<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analyzer</title>
    <style>
        body {
            font-family: Helvetica, sans-serif;
            background-image: url(/static/bg.png);
            background-size: cover;
            background-position: center;
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            margin-top: 10%;
            padding: 40px;
            border-radius: 15px;
            width: 50%;
            height: 30%;
            text-align: center;
        }

        h1 {
            color: #282626;
            font-size: 2.5rem;

        }

        p {
            color: #6b4c3b;
            font-size: 15px;

        }


        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: none;
            outline: none;
            border-radius: 10px;
            font-size: 16px;
            resize: none;
            background: transparent;
            -ms-overflow-style: none;
            scrollbar-width: none;
            box-sizing: border-box;
            word-wrap: break-word;
            overflow-wrap: break-word;

        }

        .chat-box {
            position: relative;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 10px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }


        button {
            background: #f58b49;
            color: rgb(33, 32, 32);
            border: none;
            padding: 10px 30px;
            font-size: 12px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 0;
            margin-left: 10px;
            white-space: nowrap;
            position: absolute;
            bottom: 12px;
            right: 12px;
        }

        button:hover {
            background: #c85f1e;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
        }

        .positive {
            background: rgba(76, 175, 80, 0.15);
            color: #2e7d32;
            border: 2px solid rgba(76, 175, 80, 0.3);
        }

        .negative {
            background: rgba(198, 64, 50, 0.15);
            color: #c62828;
            border: 2px solid rgba(198, 64, 50, 0.3);
        }
    </style>

</head>

<body>
    <div class="container">
        <h1>🎬 Movie Sentiment Analyzer</h1>
        <p>Enter a movie review and find out if it's positive or negative</p>
        <form method="POST">
            <div class="chat-box">
                <textarea name="review" placeholder="Type your movie review here..." required></textarea>
                <button type="submit">Analyze Sentiment</button>
            </div>
        </form>
        {% if result %}
        <div class="result {{ result }}">{{result | upper }}</div>
        {% endif %}
    </div>


</body>

</html>
