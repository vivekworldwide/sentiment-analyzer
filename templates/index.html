<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analyzer</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #16213e;
            padding: 40px;
            border-radius: 15px;
            width: 500px;
            text-align: center;
        }

        h1 {
            color: #e94560;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
        }

        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;

        }

        button:hover {
            background: #c81e45;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
        }

        .positive {
            background-color: #0f3460;
            color: #4ecca3;
        }

        .negative {
            background-color: #0f3460;
            color: #e94560;
        }
    </style>

</head>

<body>
    <div class="container">
        <h1>🎬 Movie Sentiment Analyzer</h1>
        <p>Enter a movie review and find out if it's positive or negative</p>
        <form method=" POST">
            <textarea name="review" placeholder="Type your movie review here..." required></textarea>
            <br>
            <button type="submit">Analyze Sentiment</button>
        </form>
        {% if result %}
        <div class="result {{ result }}">{{result | upper }}</div>
        {% endif %}
    </div>


</body>

</html>
